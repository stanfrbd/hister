name: Publish to WinGet

on:
  release:
    types: [released]

permissions:
  contents: read

jobs:
  publish:
    if: github.repository == 'asciimoo/hister'
    name: Publish to WinGet
    runs-on: ubuntu-slim
    steps:
      - uses: vedantmgoyal9/winget-releaser@main
        with:
          identifier: asciimoo.hister
          installers-regex: '\.exe$'
          token: ${{ secrets.WINGET_TOKEN }}
